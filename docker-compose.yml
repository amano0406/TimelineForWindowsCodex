name: timeline-for-windows-codex

services:
  worker:
    image: timeline-for-windows-codex-worker
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINE_FOR_WINDOWS_CODEX_RUNTIME: docker
      TIMELINE_FOR_WINDOWS_CODEX_API_BIND_HOST: 0.0.0.0
      TIMELINE_FOR_WINDOWS_CODEX_API_BIND_PORT: 8080
      TIMELINE_FOR_WINDOWS_CODEX_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINE_FOR_WINDOWS_CODEX_APPDATA_ROOT: /shared/app-data
      TIMELINE_FOR_WINDOWS_CODEX_SETTINGS_PATH: /shared/app-data/settings.json
    ports:
      - "127.0.0.1:${TIMELINE_FOR_WINDOWS_CODEX_API_PORT:-19200}:8080"
    volumes:
      - ${HOST_TFWC_APP_DATA:-app-data}:/shared/app-data
      - ${HOST_TFWC_DOWNLOADS:-./downloads}:/shared/downloads
      - ${HOST_TFWC_TIMELINE_DATA_ROOT:-${HOST_TIMELINE_DATA:-/mnt/c/TimelineData}}:${HOST_TFWC_TIMELINE_DATA_ROOT_CONTAINER:-/mnt/c/TimelineData}
      - ${HOST_TFWC_CONFIGURED_OUTPUT_ROOT:-./outputs}:${HOST_TFWC_CONFIGURED_OUTPUT_ROOT_CONTAINER:-/mnt/c/TimelineData/windows-codex}
      - ${HOST_TFWC_SETTINGS_FILE:-./settings.json}:/shared/app-data/settings.json
      - ${HOST_CODEX_HOME:-/mnt/c/Users/amano/.codex}:/input/codex-home:ro
      - ${HOST_CODEX_BACKUP_HOME:-/mnt/c/Codex/archive/migration-backup-2026-03-27/codex-home}:/input/codex-backup:ro
      - ${HOST_CODEX_ROOT:-/mnt/c/Codex}:/input/codex-root:ro

volumes:
  app-data:
